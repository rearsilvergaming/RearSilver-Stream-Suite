<!doctype html><html><head><meta charset="utf-8"><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent;font-family:Arial,sans-serif;color:white}
#overlay{position:relative;width:100%;height:100%;display:flex;align-items:center;gap:24px;padding:20px;background:rgba(12,12,18,.82);border-radius:18px;overflow:hidden}.artbg{position:absolute;inset:-35px;background:url('/artwork') center/cover no-repeat;filter:blur(24px);opacity:.22;z-index:0}#art{position:relative;z-index:1;height:100%;aspect-ratio:1;object-fit:cover;border-radius:12px}.info{position:relative;z-index:1;min-width:0;flex:1}.title{font-size:34px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.artist{font-size:23px;opacity:.82;margin-top:8px}.album,.requester,.custom{font-size:17px;opacity:.62;margin-top:5px}.bar{height:7px;background:#353544;border-radius:8px;margin-top:24px;overflow:hidden}.fill{height:100%;width:0;background:#9147ff}.time{font-size:14px;opacity:.72;margin-top:8px}.hidden{display:none!important}
</style></head><body><div id="overlay"><div class="artbg hidden"></div><img id="art" src="/artwork"><div class="info"><div class="custom"></div><div class="title">No track playing</div><div class="artist"></div><div class="album"></div><div class="requester"></div><div class="bar"><div class="fill"></div></div><div class="time">0:00 / 0:00</div></div></div><script>
let artworkKey='';const q=s=>document.querySelector(s),fmt=ms=>{const s=Math.max(0,Math.floor(ms/1000));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')};function apply(c){const o=q('#overlay');o.style.flexDirection=c.artworkPosition==='right'?'row-reverse':'row';o.style.background=c.backgroundTransparent?'transparent':c.backgroundColour;o.style.fontFamily=c.fontFamily;o.style.color=c.textColour;q('.title').style.fontSize=c.titleSize+'px';q('.artist').style.fontSize=c.bodySize+'px';q('.album').style.fontSize=q('.requester').style.fontSize=q('.custom').style.fontSize=Math.max(8,c.bodySize-4)+'px';q('.fill').style.background=c.accentColour;['#art','.title','.artist','.album','.requester','.bar','.custom','.artbg'].forEach((s,i)=>q(s).classList.toggle('hidden',![c.showArtwork,c.showTitle,c.showArtist,c.showAlbum,c.showRequester,c.showProgress,c.showCustomText,c.artworkBackground][i]));q('.custom').textContent=c.customText||'';if(!c.backgroundTransparent&&!c.artworkBackground)o.style.background=c.backgroundColour+Math.round(c.backgroundOpacity*2.55).toString(16).padStart(2,'0');if(c.artworkBackground)o.style.background=c.backgroundTransparent?'transparent':c.backgroundColour}
async function update(){try{const [s,c]=await Promise.all([fetch('/api/state',{cache:'no-store'}).then(r=>r.json()),fetch('/api/config',{cache:'no-store'}).then(r=>r.json())]);apply(c);const t=s.track||{};q('.title').textContent=t.title||'No track playing';q('.artist').textContent=t.artist||'';q('.album').textContent=t.album||'';q('.requester').textContent=t.requestedBy?'Requested by '+t.requestedBy:'';const d=t.durationMs||0,p=s.positionMs||0,remaining=Math.max(0,d-p);q('.fill').style.width=(d?Math.min(100,p/d*100):0)+'%';q('.time').textContent=c.timingMode==='elapsed'?fmt(p):c.timingMode==='remaining'?'-'+fmt(remaining):c.timingMode==='elapsedRemaining'?fmt(p)+' / -'+fmt(remaining):fmt(p)+' / '+fmt(d);q('.time').classList.toggle('hidden',c.timingMode==='none');const k=(t.title||'')+(t.artist||'');if(k!==artworkKey){artworkKey=k;const v='?v='+Date.now();q('#art').src='/artwork'+v;q('.artbg').style.backgroundImage="url('/artwork"+v+"')"}}catch(e){}}setInterval(update,200);update();
</script></body></html>
