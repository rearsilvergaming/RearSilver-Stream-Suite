<!doctype html><html><head><meta charset="utf-8"><style>
*{box-sizing:border-box}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent;font-family:Arial,sans-serif;color:white}
#overlay{width:100%;height:100%;display:flex;align-items:center;gap:24px;padding:20px;background:rgba(12,12,18,.82);border-radius:18px}
#art{height:100%;aspect-ratio:1;object-fit:cover;border-radius:12px}.info{min-width:0;flex:1}.title{font-size:34px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.artist{font-size:23px;opacity:.82;margin-top:8px}.album{font-size:17px;opacity:.62;margin-top:5px}.bar{height:7px;background:#353544;border-radius:8px;margin-top:24px;overflow:hidden}.fill{height:100%;width:0;background:#9147ff}.time{font-size:14px;opacity:.72;margin-top:8px}
</style></head><body><div id="overlay"><img id="art" src="/artwork"><div class="info"><div class="title">No track playing</div><div class="artist"></div><div class="album"></div><div class="bar"><div class="fill"></div></div><div class="time">0:00 / 0:00</div></div></div><script>
let artworkKey='';const fmt=ms=>{const s=Math.max(0,Math.floor(ms/1000));return Math.floor(s/60)+':'+String(s%60).padStart(2,'0')};async function update(){try{const s=await(await fetch('/api/state',{cache:'no-store'})).json(),t=s.track||{};document.querySelector('.title').textContent=t.title||'No track playing';document.querySelector('.artist').textContent=t.artist||'';document.querySelector('.album').textContent=t.album||'';const d=t.durationMs||0,p=s.positionMs||0;document.querySelector('.fill').style.width=(d?Math.min(100,p/d*100):0)+'%';document.querySelector('.time').textContent=fmt(p)+' / '+fmt(d);const k=(t.title||'')+(t.artist||'');if(k!==artworkKey){artworkKey=k;document.querySelector('#art').src='/artwork?v='+Date.now()}}catch(e){}}setInterval(update,200);update();
</script></body></html>
