<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RearSilver Stream Suite | YouTube Player</title>
    <style>
      html,
      body,
      #player {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #0c0c12;
      }
    </style>
  </head>
  <body>
    <div id="player"></div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
      let player;
      let ready = false;
      let pendingVideoId = "";

      function clean(value) {
        return String(value ?? "").replace(/[\t\r\n]+/g, " ").trim();
      }

      function notify(type, ...fields) {
		if (window.chrome?.webview) {
		  window.chrome.webview.postMessage([type, ...fields.map(clean)].join("\t"));
		}
      }

      function stateName(value) {
		return ({
		  [-1]: "stopped",
		  [YT.PlayerState.ENDED]: "stopped",
		  [YT.PlayerState.PLAYING]: "playing",
		  [YT.PlayerState.PAUSED]: "paused",
		  [YT.PlayerState.BUFFERING]: "playing",
		  [YT.PlayerState.CUED]: "stopped",
		})[value] || "stopped";
	  }

      function onYouTubeIframeAPIReady() {
        player = new YT.Player("player", {
          width: "100%",
          height: "100%",
          playerVars: {
            autoplay: 0,
            controls: 1,
            fs: 1,
            playsinline: 1,
            rel: 0,
          },
          events: {
            onReady: () => {
              ready = true;
		  notify("ready");
              if (pendingVideoId) loadVideo(pendingVideoId);
            },
            onStateChange: (event) => {
		  if (event.data === YT.PlayerState.ENDED) notify("state", "ended");
		  if (event.data === YT.PlayerState.PLAYING) {
			const data = player.getVideoData();
			notify("metadata", data.title, data.author, Math.round(player.getDuration() * 1000));
		  }
		},
		onError: (event) => notify("error", event.data),
          },
        });
      }

      function loadVideo(videoId) {
        pendingVideoId = videoId;
        if (ready && player) {
          pendingVideoId = "";
          player.loadVideoById(videoId);
        }
      }

      window.rsMusic = {
        load: loadVideo,
        play: () => ready && player.playVideo(),
        pause: () => ready && player.pauseVideo(),
        stop: () => ready && player.stopVideo(),
        restart: () => {
          if (!ready) return;
          player.seekTo(0, true);
          player.playVideo();
        },
        seek: (seconds) => ready && player.seekTo(Math.max(0, seconds), true),
        status: () => ({
          ready,
          position: ready ? player.getCurrentTime() : 0,
          duration: ready ? player.getDuration() : 0,
          videoId: ready ? player.getVideoData().video_id || "" : "",
        }),
      };

	  setInterval(() => {
		if (!ready || !player) return;
		notify(
		  "status",
		  stateName(player.getPlayerState()),
		  Math.round(player.getCurrentTime() * 1000),
		  Math.round(player.getDuration() * 1000),
		);
	  }, 250);
    </script>
  </body>
</html>
