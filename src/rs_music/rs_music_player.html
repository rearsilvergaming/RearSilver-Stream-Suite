<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>RearSilver Stream Suite | YouTube Player</title>
    <style>
      html,
      body,
      #player {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #0c0c12;
      }
    </style>
  </head>
  <body>
    <div id="player"></div>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
      let player;
      let ready = false;
      let pendingVideoId = "";

      function notify(type, detail = {}) {
        if (window.chrome?.webview) {
          window.chrome.webview.postMessage({ type, ...detail });
        }
      }

      function onYouTubeIframeAPIReady() {
        player = new YT.Player("player", {
          width: "100%",
          height: "100%",
          playerVars: {
            autoplay: 0,
            controls: 1,
            fs: 1,
            playsinline: 1,
            rel: 0,
          },
          events: {
            onReady: () => {
              ready = true;
              notify("ready");
              if (pendingVideoId) loadVideo(pendingVideoId);
            },
            onStateChange: (event) => {
              const states = {
                [-1]: "unstarted",
                [YT.PlayerState.ENDED]: "ended",
                [YT.PlayerState.PLAYING]: "playing",
                [YT.PlayerState.PAUSED]: "paused",
                [YT.PlayerState.BUFFERING]: "buffering",
                [YT.PlayerState.CUED]: "cued",
              };
              notify("state", { state: states[event.data] || "unknown" });
            },
            onError: (event) => notify("error", { code: event.data }),
          },
        });
      }

      function loadVideo(videoId) {
        pendingVideoId = videoId;
        if (ready && player) {
          pendingVideoId = "";
          player.loadVideoById(videoId);
        }
      }

      window.rsMusic = {
        load: loadVideo,
        play: () => ready && player.playVideo(),
        pause: () => ready && player.pauseVideo(),
        stop: () => ready && player.stopVideo(),
        restart: () => {
          if (!ready) return;
          player.seekTo(0, true);
          player.playVideo();
        },
        seek: (seconds) => ready && player.seekTo(Math.max(0, seconds), true),
        status: () => ({
          ready,
          position: ready ? player.getCurrentTime() : 0,
          duration: ready ? player.getDuration() : 0,
          videoId: ready ? player.getVideoData().video_id || "" : "",
        }),
      };
    </script>
  </body>
</html>
